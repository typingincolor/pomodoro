name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-sign-notarize:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build number
        run: |
          set -euo pipefail
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            BUILD_NUMBER=1
          elif [[ "$LATEST" =~ ^v([0-9]+)$ ]]; then
            BUILD_NUMBER=$(( ${BASH_REMATCH[1]} + 1 ))
          else
            echo "::error::Unexpected tag format: $LATEST (expected vN)"
            exit 1
          fi
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=1.0.$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "Release: v$BUILD_NUMBER (1.0.$BUILD_NUMBER)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE_PATH="/Applications/Xcode_16.3.app/Contents/Developer"
          if [ ! -d "$XCODE_PATH" ]; then
            echo "::error::Xcode not found at $XCODE_PATH"
            ls /Applications/Xcode* 2>/dev/null || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          echo "$CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Pomdoro.xcodeproj \
            -scheme Pomdoro \
            -destination 'generic/platform=macOS' \
            -archivePath build/Pomdoro.xcarchive \
            -configuration Release \
            MARKETING_VERSION="$RELEASE_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES \
            2>&1 | tee build.log

      - name: Export app from archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > export-options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/Pomdoro.xcarchive \
            -exportOptionsPlist export-options.plist \
            -exportPath build/export

      - name: Verify code signature
        run: |
          set -euo pipefail
          echo "Verifying code signature..."
          codesign --verify --deep --strict --verbose=2 build/export/Pomdoro.app

      - name: Create DMG
        run: |
          set -euo pipefail
          DMG_NAME="Pomdoro-${BUILD_NUMBER}.dmg"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

          mkdir -p build/dmg
          cp -R build/export/Pomdoro.app build/dmg/
          ln -s /Applications build/dmg/Applications

          hdiutil create -volname "Pomdoro" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/$DMG_NAME"

      - name: Notarize DMG
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          xcrun notarytool submit "build/$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json \
            --wait \
            2>&1 | tee build/notarize-result.json

          STATUS=$(python3 -c "import json; print(json.load(open('build/notarize-result.json'))['status'])")
          SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('build/notarize-result.json'))['id'])")

          echo "Notarization status: $STATUS (submission: $SUBMISSION_ID)"

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              build/notarization-log.json || true
            cat build/notarization-log.json 2>/dev/null || true
            exit 1
          fi

          xcrun stapler staple "build/$DMG_NAME"
          xcrun stapler validate "build/$DMG_NAME"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "v${BUILD_NUMBER}" &>/dev/null; then
            echo "Release v${BUILD_NUMBER} already exists, uploading asset..."
            gh release upload "v${BUILD_NUMBER}" "build/$DMG_NAME" --clobber
          else
            gh release create "v${BUILD_NUMBER}" \
              "build/$DMG_NAME" \
              --title "Pomdoro Build ${BUILD_NUMBER}" \
              --generate-notes
          fi

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG_URL="https://github.com/typingincolor/pomdoro/releases/download/v${BUILD_NUMBER}/${DMG_NAME}"
          SHA256=$(shasum -a 256 "build/$DMG_NAME" | awk '{print $1}')

          cat > /tmp/pomdoro.rb << CASK
          cask "pomdoro" do
            version "${BUILD_NUMBER}"
            sha256 "${SHA256}"

            url "${DMG_URL}"
            name "Pomdoro"
            desc "macOS menu bar pomodoro timer with dual seven-segment LCD displays"
            homepage "https://github.com/typingincolor/pomdoro"

            app "Pomdoro.app"

            zap trash: [
              "~/Library/Preferences/com.pomdoro.Pomdoro.plist",
            ]
          end
          CASK

          gh api repos/typingincolor/homebrew-tap/contents/Casks/pomdoro.rb \
            --method PUT \
            --field message="Update pomdoro to build ${BUILD_NUMBER}" \
            --field content="$(base64 -i /tmp/pomdoro.rb)" \
            --field sha="$(gh api repos/typingincolor/homebrew-tap/contents/Casks/pomdoro.rb --jq '.sha' 2>/dev/null || echo '')" \
            || \
          gh api repos/typingincolor/homebrew-tap/contents/Casks/pomdoro.rb \
            --method PUT \
            --field message="Add pomdoro cask build ${BUILD_NUMBER}" \
            --field content="$(base64 -i /tmp/pomdoro.rb)"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: |
            build.log
            build/notarize-result.json
            build/notarization-log.json

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true
