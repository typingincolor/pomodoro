name: Pomodoro
options:
  bundleIdPrefix: com.pomodoro
  deploymentTarget:
    macOS: "14.0"
targets:
  Pomodoro:
    type: application
    platform: macOS
    settings:
      SWIFT_VERSION: "6.0"
      SWIFT_STRICT_CONCURRENCY: complete
      CODE_SIGN_ENTITLEMENTS: Pomodoro/Pomodoro.entitlements
      GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: Pomodoro
        excludes:
          - "**/*.md"
          - "**/*.entitlements"
  PomodoroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PomodoroTests
        excludes:
          - "**/*.md"
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pomodoro
  PomodoroUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: PomodoroUITests
        excludes:
          - "**/*.md"
    settings:
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pomodoro
