name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project Pomdoro.xcodeproj \
            -scheme Pomdoro \
            -destination 'platform=macOS' \
            -configuration Debug \
            build | xcpretty

      - name: Run unit tests
        run: |
          xcodebuild test -project Pomdoro.xcodeproj \
            -scheme Pomdoro \
            -destination 'platform=macOS' \
            -only-testing:PomdoroTests | xcpretty
