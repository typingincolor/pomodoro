name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -project Pomdoro.xcodeproj \
            -scheme Pomdoro \
            -destination 'platform=macOS' \
            -configuration Debug \
            build 2>&1 | tee build.log | tail -30

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test -project Pomdoro.xcodeproj \
            -scheme Pomdoro \
            -destination 'platform=macOS' \
            -only-testing:PomdoroTests 2>&1 | tee test.log | tail -30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            test.log
